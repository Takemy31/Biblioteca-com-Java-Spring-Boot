<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Editar Autor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="mb-4">Editar Autor</h1>

    <form th:action="@{/authors/update/{id}(id=${author.id})}"
          th:object="${author}"
          method="post">

        <div class="mb-3">

            <label class="form-label">Nome</label>

            <input type="text"
                   class="form-control"
                   th:field="*{name}">

        </div>

        <div class="mb-3">
    <label class="form-label">Ano de Nascimento</label>

    <input type="number"
           th:field="*{birthYear}"
           class="form-control">
</div>

        <button type="submit" class="btn btn-primary">
            Atualizar
        </button>

        <a href="/authors" class="btn btn-secondary">
            Voltar
        </a>

    </form>

</div>

</body>
</html>
