<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Autores</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="mb-4">Lista de Autores</h1>

    <a href="/authors/create" class="btn btn-success mb-3">
        Novo Autor
    </a>

    <table class="table table-striped">

        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Nascimento</th>
            <th>Ações</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="author : ${authors}">

            <td th:text="${author.id}"></td>
            <td th:text="${author.name}"></td>
            <td th:text="${author.birthYear}"></td>

            <td>

                <a th:href="@{/authors/{id}(id=${author.id})}"
                   class="btn btn-info btn-sm">
                    Ver
                </a>

                <a th:href="@{/authors/edit/{id}(id=${author.id})}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a th:href="@{/authors/delete/{id}(id=${author.id})}"
                   class="btn btn-danger btn-sm">
                    Excluir
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
