<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalhes do Autor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="mb-4">Detalhes do Autor</h1>

    <div class="card">

        <div class="card-body">

            <p>
                <strong>ID:</strong>
                <span th:text="${author.id}"></span>
            </p>

            <p>
                <strong>Nome:</strong>
                <span th:text="${author.name}"></span>
            </p>

            <p>
                 <strong>Nascimento:</strong>
                 <span th:text="${author.birthYear}"></span>
            </p>

            <hr>

<h3>Livros do Autor</h3>

<ul class="list-group">
    <li class="list-group-item"
        th:each="book : ${author.books}"
        th:text="${book.title}">
    </li>
</ul>

        </div>

    </div>

    <a href="/authors" class="btn btn-secondary mt-3">
        Voltar
    </a>

</div>

</body>
</html>
