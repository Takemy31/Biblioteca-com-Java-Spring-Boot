<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Livros</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="mb-4">Lista de Livros</h1>

    <a href="/books/create" class="btn btn-success mb-3">
        Novo Livro
    </a>

    <table class="table table-striped">

        <thead>
    <tr>
        <th>ID</th>
        <th>Título</th>
        <th>Autor</th>
        <th>Páginas</th>
        <th>Ano</th>
        <th>Ações</th>
    </tr>
</thead>

        <tbody>

<tr th:each="book : ${books}">

    <td th:text="${book.id}"></td>
    <td th:text="${book.title}"></td>
    <td th:text="${book.author != null ? book.author.name : 'Sem autor'}"></td>
    <td th:text="${book.pages}"></td>
    <td th:text="${book.publishedYear}"></td>

    <td>

        <a th:href="@{/books/{id}(id=${book.id})}"
           class="btn btn-info btn-sm">
            Ver
        </a>

        <a th:href="@{/books/edit/{id}(id=${book.id})}"
           class="btn btn-warning btn-sm">
            Editar
        </a>

        <a th:href="@{/books/delete/{id}(id=${book.id})}"
           class="btn btn-danger btn-sm">
            Excluir
        </a>

    </td>

</tr>

</tbody>

    </table>

</div>

</body>
</html>
