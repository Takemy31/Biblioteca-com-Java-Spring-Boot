<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalhes do Livro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="mb-4">Detalhes do Livro</h1>

    <div class="card">

        <div class="card-body">

            <p>
                <strong>ID:</strong>
                <span th:text="${book.id}"></span>
            </p>

            <p>
                <strong>Título:</strong>
                <span th:text="${book.title}"></span>
            </p>

            <p>
                <strong>Autor:</strong>
                <span th:text="${book.author != null ? book.author.name : 'Sem autor'}"></span>
            </p>

            <p>
                <strong>Páginas:</strong>
                <span th:text="${book.pages}"></span>
            </p>

            <p>
                <strong>Ano:</strong>
                <span th:text="${book.publishedYear}"></span>
            </p>

        </div>

    </div>

    <a href="/books" class="btn btn-secondary mt-3">
        Voltar
    </a>

</div>

</body>
</html>
